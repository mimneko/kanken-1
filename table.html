<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">JSON Table</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="table-container">
        <h1 id="page-heading">JSON Table</h1>
        <table id="json-table">
            <!-- CSVデータがここに挿入されます -->
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // URLから指定されたパラメータの値を取得して、適切なJSONファイルのパスを指定
            var jsonFileName = decodeURIComponent(getParameterByName('json'));
            var jsonFilePath = 'json_files/' + jsonFileName + '.json'; // JSONファイルのパスを構築

            // JSONファイルを読み込んでテーブルを構築する
            fetch(jsonFilePath)
                .then(response => response.json())
                .then(data => buildTable(data));

            // テーブルを構築する関数
            function buildTable(data) {
                var table = document.getElementById('json-table');

                // ヘッダー行の作成
                var headerRow = document.createElement('tr');
                for (var key in data[0]) {
                    if (data[0].hasOwnProperty(key)) {
                        var headerCell = document.createElement('th');
                        headerCell.textContent = key;
                        headerRow.appendChild(headerCell);
                    }
                }
                table.appendChild(headerRow);

                // データ行の作成
                data.forEach(function(item) {
                    var row = document.createElement('tr');
                    for (var key in item) {
                        if (item.hasOwnProperty(key)) {
                            var cell = document.createElement('td');
                            cell.textContent = item[key];
                            row.appendChild(cell);
                        }
                    }
                    table.appendChild(row);
                });
            }

            // URLから指定されたパラメータの値を取得する関数
            function getParameterByName(name) {
                name = name.replace(/[\[\]]/g, '\\$&');
                var regex = new RegExp('[?&]' + name + '(=([^&#]*)|&|#|$)'),
                    results = regex.exec(window.location.href);
                if (!results) return null;
                if (!results[2]) return '';
                return results[2].replace(/\+/g, ' ');
            }
        });
    </script>
</body>
</html>
