<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages Example</title>
</head>
<body>

<script>
    // レコードのデータ（例）
    const recordData = [
        { 番: 1, 問題: '樹懶', 難度: '◆１', 解答: 'なまけもの', 別答: '', 意味: '...' },
        // 他のレコードデータも同様に
    ];

    // レコードのクラス
    class Record {
        constructor(number, question, difficulty, answer, alternative, meaning) {
            this.number = number;
            this.question = question;
            this.difficulty = difficulty;
            this.answer = answer;
            this.alternative = alternative;
            this.meaning = meaning;
        }
    }

    // レコードのインスタンスを作成
    const records = recordData.map(data => new Record(data.番, data.問題, data.難度, data.解答, data.別答, data.意味));

    // レコードのインスタンスを使って何かしらの処理を行う...
    console.log(records);
</script>

</body>
</html>
